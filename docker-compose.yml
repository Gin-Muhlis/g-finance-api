services:
  postgres:
    image: postgres:16-alpine
    container_name: gfinance-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: gfinance
      POSTGRES_PASSWORD: gfinance_secret
      POSTGRES_DB: gfinance
    ports:
      - '5432:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
